################################################################################
#             CONFIGURATION FILE: dust_calc_runner.py                          #
################################################################################
# -----------------
# Input catalogs
# -----------------

# cat_config: path to configuration file specifying catalog properties
# NOTES:
#  - allowed keys for "redshifts" are: use_bin_numbers, nbins, and min_z
#  - "treecorr_npatch" sets the number of sky patches used in treecorr

background_catalog:
  cat_config: 'configs/catalog_configs/sdss_bg_galaxies.yaml'
  treecorr_npatch: 10   # Set number of treecorr patches
  redshifts: # How to deal with redshifts
    nbins: 10

background_randoms:
  cat_config: 'configs/catalog_configs/sdss_bg_randoms.yaml'
  redshifts: # How to deal with redshifts
    nbins: 10

foreground_catalog:
  cat_config: 'configs/catalog_configs/GWSLC_cat.yaml'

foreground_randoms:
  cat_config: 'configs/catalog_configs/GWSLC_randoms.yaml'

# ------------------
# Output parameters
# ------------------

# Where output files and plots will get saved
output_path: 'output/sdss_x_gwslc'
# basename or prefix for assorted files to save
output_basename: 'dustcorrel_quiescent_10zbins'
# Plot output dust profile in kiloparsecs (False) or arcminutes (True)
use_kpc: True

# -----------------
# Correlation function parameters:
# -----------------
treecorr_params:
  min_sep: 0.1
  max_sep: 220.0
  bin_size: 0.6
  sep_units: 'arcmin'
  var_method: 'sample'

# Parameters for dust model
dust_params:
  # Must be one of 'calzetti00', 'ccm89', 'odonnell94', 'fitzpatrick99', or 'g23'
  model: 'g23'
  # Ratio of selective to total extinction
  R: 3.1
  # Extinction in V band
  A_V: 1
  # Bandpass column names in catalog
  band_names: ['dered_u', 'dered_g', 'dered_r', 'dered_i', 'dered_z']
  #  Error/uncertainty column names in catalog (in order, please!)
  err_names: ['err_u', 'err_g', 'err_r', 'err_i', 'err_z']
  # Central wavelengths (spectrum) to model; should match number of bands!
  wavelengths: [3556.52, 4702.50, 6175.58, 7489.98, 8946.71]
