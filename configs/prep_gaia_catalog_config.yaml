################################################################################
#                            CONFIGURATION FILE                               #
################################################################################

# Description:
# This configuration file allows you to customize the settings for
# cat_prep_runner.py

# Note:
# - Do not change the variable names (the text before the equal sign).
# - Only modify the values on the right side of the equal sign (=).

# General Settings:
# -----------------
# catalog_path: generic location for catalogs
# output_path: where to save files

# Set some defaults because I am lazy
paths:
  # general path for catalogs
  catalog_path: '/work/mccleary_group/dusty_halos/catalogs'
  # Where to save outputs
  output_path: '/work/mccleary_group/dusty_halos/catalogs/prep_cat_output'

#
#
# Input catalogs and masks:
# -----------------

# This is probably the background
background_catalog:
  # Where is it? Leave blank or commented out to use default
  #path:
  filename: 'y3a2_gold2.2.1_redmagic_highlum_highz.fits'
  # nickname for table if we are matching to another catalog
  tabname: 'redmagic_hiz'
  # WCS frame
  coordframe: 'icrs'
  # RA/Dec units
  coord_units: 'deg'
  # RA/Dec column names
  ra_tag: 'ra'
  dec_tag: 'dec'
  # Name for filtered (possibly joined) output catalog
  output_name: 'rmz_highlum_hiz_MOF.fits'
  # Are we matching? Uncomment fields below if true!
  #match:

# background mask
background_mask:
  # Where is it? Leave blank or commented out to use default paths
  path:
  # What is it called?
  filename: 'y3_gold_2.2.1_RING_joint_redmagic_v0.5.1_wide_maglim_v2.2_mask.fits'

  # IMPORTANT!!! GET COORDINATE FRAME CORRECT OR MASKING WILL FAIL!
  coordframe: 'icrs'
  # Is mask partial?
  partial: True

# This is probably the foreground
foreground_catalog:
  # Where is it?
  #path:
  # What is it called ?
  filename: 'gaia_stars_southern_full.fits'
  # Name for filtered (possibly joined) output catalog
  output_name: 'masked_gaia_starcat.fits'
  # RA, Dec names + units + coordframe
  coordframe: 'icrs'
  ra_tag: 'ra'
  dec_tag: 'dec'
  coord_units: 'deg'
  # output_path: '/work/mccleary_group/dusty_halos/catalogs'
  # Are we matching? Uncomment if matching
  match:

# probably foreground mask
foreground_mask:
  # Where is it?
  #path:
  # What is it called?
  filename: 'gaia_cat_southern_hpmask.fits'
  # IMPORTANT!!! GET COORDINATE FRAME CORRECT OR MASKING WILL FAIL!
  coordframe: 'icrs'
  # Is mask partial? When in doubt, do not pass this argument. Code will figure it out
