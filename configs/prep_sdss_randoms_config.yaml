################################################################################
#                            CONFIGURATION FILE                               #
################################################################################

# Description:
# This configuration file allows you to customize the settings for
# prep_random_cat_runner.py

# Note:
# - Do not change the variable names (the text before the equal sign).
# - Only modify the values on the right side of the colon sign (:).

# General Settings:
# -----------------
# catalog_path: generic location for catalogs
# output_path: where to save files

# Set some defaults
paths:
  # general path for catalogs
  catalog_path: '/Users/j.mccleary/Research/dusty_halos/catalogs'
  # Where to save outputs
  output_path: '/Users/j.mccleary/Research/dusty_halos/catalogs/prep_cat_output'

# How many random points are we making?
# Suggestion: use 1e6 for making overlap plots, > 3e7 for science
nrand: 1e6

# Output name for random catalog; note that "masked_" will be added as prefix
output_name: 'sdss_bg_gals_randoms.fits'

# Populate if comparison to another catalog's RA, Dec distribution is desired
comparison_cat: '/Users/j.mccleary/Research/dusty_halos/catalogs/prep_cat_output/DoubleMasked_sdss_fg_gals_jemcclear.fits'

# HpMask for which random points are desired
mask1:
  # Where is mask2? Leave blank or commented out to use default paths
  path:
  # What is it called?
  filename: 'sdss_bg_gals_jemcclear_healpix_mask.fits'
  # IMPORTANT!!! GET COORDINATE FRAME CORRECT OR MASKING WILL FAIL!
  coordframe: 'icrs'
  # Is mask partial?
  partial: False

# Uncomment if catalog should also be masked against a second mask
mask2:
  # Where is mask2? If none, code assumes general catalog_path
  path:
  # What is mask2 called?
  filename: 'sdss_fg_gals_jemcclear_healpix_mask.fits'
  # IMPORTANT!!! GET COORDINATE FRAME CORRECT OR MASKING WILL FAIL!
  coordframe: 'icrs'
  # Is mask partial? When in doubt, do not pass this argument; code will figure it out.
  partial: False
