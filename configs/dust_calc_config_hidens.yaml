################################################################################
#             CONFIGURATION FILE: dust_calc_runner.py                          #
################################################################################
# -----------------
# Input catalogs
# -----------------

# cat_config: path to configuration file specifying catalog properties
# NOTES:
#  - allowed keys for "redshifts" are: use_bin_numbers, nbins, and min_z
#  - "treecorr_npatch" sets the number of sky patches used in treecorr

background_catalog:
  cat_config: 'configs/catalog_configs/redmagic_hidens_y3gold_joined.yaml'
  treecorr_npatch: 10   # Set number of treecorr patches
  redshifts: # How to deal with redshifts
    #use_bin_numbers: True # Basically just for redmagic
    nbins: 15

background_randoms:
  cat_config: 'configs/catalog_configs/redmagic_hidens_randoms.yaml'
  redshifts: # How to deal with redshifts
    #use_bin_numbers: True # Basically just for redmagic
    nbins: 15

foreground_catalog:
  cat_config: 'configs/catalog_configs/WISExSCOS_cat.yaml'

foreground_randoms:
  cat_config: 'configs/catalog_configs/WISExSCOS_randoms.yaml'

# ------------------
# Output parameters
# ------------------

# Where output files and plots will get saved
output_path: 'output/redmagic_hidens_newvar'
# basename or prefix for assorted files to save
output_basename: 'dust_correlation_calzetti00_15zbins'
# Plot output dust profile in kiloparsecs (True) or arcminutes (False)
use_kpc: True

# -----------------
# Correlation function parameters:
# -----------------
treecorr_params:
  min_sep: 0.1
  max_sep: 200.0
  bin_size: 0.6
  sep_units: 'arcmin'
  var_method: 'sample'

# Parameters for dust model
dust_params:
  # Must be one of 'fm07', 'calzetti00', 'ccm89', 'odonnell94', 'fitzpatrick99'
  model: 'calzetti00'
  # Ratio of selective to total extinction
  R: 3.1
  # Extinction in V band
  A_V: 1
  # Wavelengths (spectrum) to model; should match number of bands!
  wavelengths: [4808.49, 6417.65, 7814.58, 9168.85]

# Placeholder for selecting bands; make it a list?
bands:
